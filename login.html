<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Voting System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            🗳️ VoteChain
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="index.html#about">About</a></li>
        </ul>
    </nav>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <h2>🔐 Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="voterId">Voter ID</label>
                    <input type="text" id="voterId" name="voterId" placeholder="Enter your Voter ID" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="radio-group">
                    <label>
                        <input type="radio" name="userType" value="voter" checked>
                        Login as Voter
                    </label>
                    <label>
                        <input type="radio" name="userType" value="admin">
                        Login as Admin
                    </label>
                </div>

                <button type="submit" class="btn-primary">Login</button>
            </form>

            <div class="register-link">
                New voter? <a href="#register">Register</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Decentralized Voting System</p>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const voterId = document.getElementById('voterId').value;
            const password = document.getElementById('password').value;
            const userType = document.querySelector('input[name="userType"]:checked').value;

            // Simple validation (in real app, this would be handled by backend)
            if (voterId && password) {
                if (userType === 'admin') {
                    // Redirect to admin dashboard
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Redirect to voting page
                    localStorage.setItem('voterId', voterId);
                    window.location.href = 'voting.html';
                }
            } else {
                alert('Please fill in all fields');
            }
        });
    </script>
</body>
</html>
